<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroLock — Save in Sats, Together</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #3DFFD0;
    --mint-dim: #1ABFA0;
    --mint-glow: rgba(61, 255, 208, 0.15);
    --orange: #FF6B1A;
    --orange-dim: #CC5510;
    --orange-glow: rgba(255, 107, 26, 0.2);
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #1A1A1A;
    --border: #242424;
    --text: #F5F5F0;
    --text-muted: #888880;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
 
  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
 
  .logo span { color: var(--mint); }
 
  .nav-right { display: flex; align-items: center; gap: 16px; }
 
sats-ticker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--font-display);
  }
 
  .sats-ticker .dot {
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
 
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--mint-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px var(--mint-glow); }
  }


  .btn-primary {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
 
  .btn-primary:hover {
    background: var(--orange-dim);
    box-shadow: 0 0 24px var(--orange-glow);
    transform: translateY(-1px);
  }
 
  .btn-mint {
    background: transparent;
    color: var(--mint);
    border: 1px solid var(--mint);
    border-radius: 100px;
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .btn-mint:hover {
    background: var(--mint-glow);
  }
 

  /* ── HERO ── */
  .hero {
    padding: 80px 40px 60px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
 
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mint);
    margin-bottom: 20px;
    font-family: var(--font-display);
  }
 
  .hero h1 {
    font-family: var(--font-display);
    font-size: 52px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }
 
  .hero h1 .accent-orange { color: var(--orange); }
  .hero h1 .accent-mint { color: var(--mint); }
 
  .hero-sub {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 36px;
    max-width: 420px;
  }
 
  .hero-ctas { display: flex; gap: 12px; align-items: center; }
 
  .hero-stats {
    display: flex;
    gap: 32px;
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
 
  .hero-stat-val {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
 
  .hero-stat-val.orange { color: var(--orange); }
  .hero-stat-val.mint { color: var(--mint); }
 
  .hero-stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 500;
  }
 

  /* ── VAULT SHOWCASE (hero right) ── */
  .vault-showcase {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
 
  .vault-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
 
  .vault-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(61,255,208,0.04) 100%);
    pointer-events: none;
  }
 
  .vault-card.featured {
    border-color: var(--orange);
    box-shadow: 0 0 32px rgba(255,107,26,0.12);
  }
 
  .vault-card.featured::before {
    background: linear-gradient(135deg, transparent 50%, rgba(255,107,26,0.07) 100%);
  }

  /* ── VAULT RING (signature element) ── */
  .vault-ring {
    position: relative;
    flex-shrink: 0;
  }
 
  .vault-ring svg { transform: rotate(-90deg); }
 
  .vault-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .vault-ring .ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
  .vault-ring .ring-fill.mint { stroke: var(--mint); }
  .vault-ring .ring-fill.orange { stroke: var(--orange); }
 
  .vault-ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
  }
 
  .vault-ring-pct .pct-num { font-size: 15px; }
  .vault-ring-pct .pct-sym { font-size: 9px; color: var(--text-muted); }
 
  .vault-info { flex: 1; min-width: 0; }
  .vault-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
 
  .vault-goal-text {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
 
  .vault-sats {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
 
  .vault-sats .sats-num {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--mint);
  }
 
  .vault-sats .sats-of {
    font-size: 12px;
    color: var(--text-muted);
  }
 
  .vault-members {
    display: flex;
    margin-top: 8px;
    gap: -4px;
  }
 
  .member-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-family: var(--font-display);
    margin-right: -6px;
  }
 
  .vault-badge {
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-display);
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
    align-self: flex-start;
  }
 
  .vault-badge.active { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--orange); }
  .vault-badge.saving { background: var(--mint-glow); color: var(--mint); border: 1px solid var(--mint-dim); }
 
  /* ── SECTION: HOW IT WORKS ── */
  .section {
    padding: 80px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }
 
  .section-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--orange);
    font-family: var(--font-display);
    margin-bottom: 14px;
  }
 
  .section-title {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 48px;
  }
 
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
 
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    transition: border-color 0.2s;
  }
 
  .step-card:hover { border-color: var(--mint); }
 
  .step-num {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--mint);
    margin-bottom: 16px;
    opacity: 0.6;
  }
 
  .step-icon {
    font-size: 28px;
    margin-bottom: 14px;
    display: block;
  }
 
  .step-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
 
  .step-desc {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.6;
  }
 

  /* ── POOLS DASHBOARD ── */
  .dashboard {
    padding: 0 40px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }
 
  .dashboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
 
  .dashboard-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
 
  .pools-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
 
  .pool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
 
  .pool-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--mint), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
 
  .pool-card:hover {
    border-color: #333;
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }
 
  .pool-card:hover::after { transform: scaleX(1); }
 
  .pool-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
 
  .pool-emoji {
    font-size: 32px;
    margin-bottom: 10px;
    display: block;
  }
 
  .pool-card-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }
 
  .pool-card-desc {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
 
  .pool-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }
 
  .pool-progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--mint), var(--mint-dim));
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }
 
  .pool-progress-fill.warm {
    background: linear-gradient(90deg, var(--orange), #ffaa44);
  }
 
  .pool-nums {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
 
  .pool-saved {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--mint);
    letter-spacing: -0.5px;
  }
 
  .pool-saved.warm { color: var(--orange); }
 
  .pool-goal {
    font-size: 12px;
    color: var(--text-muted);
  }
 
  .pool-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
 
  .pool-members-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .pool-member-count {
    font-size: 12px;
    color: var(--text-muted);
  }
 
  .pool-days {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    font-family: var(--font-display);
  }
 
  .pool-days strong {
    color: var(--orange);
  }
 

  /* ADD POOL CARD */
  .pool-card-add {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 28px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 260px;
    transition: all 0.2s;
    color: var(--text-muted);
  }
 
  .pool-card-add:hover {
    border-color: var(--mint);
    color: var(--mint);
    background: var(--mint-glow);
  }
 
  .add-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px dashed currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    transition: transform 0.2s;
  }
 
  .pool-card-add:hover .add-icon { transform: rotate(90deg); }
 
  .add-label {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
  }


  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
 
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
 
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    transform: translateY(24px);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
 
  .modal-overlay.open .modal { transform: translateY(0); }
 
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
 
  .modal-sub {
    font-size: 13.5px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
 
  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--surface2);
    border: none;
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
 
  .modal-close:hover { color: var(--text); background: var(--border); }
 
  .form-field {
    margin-bottom: 20px;
  }
 
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
 
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
 
  .form-input:focus { border-color: var(--mint); }
  .form-input::placeholder { color: var(--border); }
 
  .emoji-picker {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
 
  .emoji-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
 
  .emoji-btn:hover, .emoji-btn.selected {
    border-color: var(--mint);
    background: var(--mint-glow);
  }
 
  .sat-converter {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
 
  .sat-converter .btc-icon { font-size: 16px; }
 
  .sat-converter .converted {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--mint);
    font-weight: 600;
  }
 
  .sat-converter .rate-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }
 
  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }
 
  .modal-footer .btn-primary { flex: 1; padding: 14px; font-size: 15px; border-radius: 12px; }
  .modal-footer .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    font-family: var(--font-display);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .modal-footer .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
 
  /* ── CONTRIBUTE MODAL ── */
  .contrib-pool-info {
    background: var(--bg);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
 
  .contrib-pool-emoji { font-size: 28px; }
 
  .contrib-pool-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
 
  .contrib-pool-progress {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
 
  .sat-quick-amounts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
 
  .sat-quick-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: var(--font-display);
    color: var(--text);
  }
 
  .sat-quick-btn .sat-amount {
    font-size: 13px;
    font-weight: 700;
    display: block;
    color: var(--mint);
  }
 
  .sat-quick-btn .sat-usd {
    font-size: 10px;
    color: var(--text-muted);
    display: block;
    margin-top: 2px;
  }
 
  .sat-quick-btn:hover, .sat-quick-btn.selected {
    border-color: var(--mint);
    background: var(--mint-glow);
  }
   /* ── BITCOIN WHY SECTION ── */
  .why-section {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 80px 40px;
  }
 
  .why-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
 
  .why-quote {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
 
  .why-quote .hl { color: var(--orange); }
 
  .why-body {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }
 
  .why-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
 
  .why-pill {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-display);
  }
 
  .why-pill.mint { background: var(--mint-glow); color: var(--mint); border: 1px solid var(--mint-dim); }
  .why-pill.orange { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--orange); }
 
  .why-stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
 
  .why-stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
 
  .why-stat-val {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

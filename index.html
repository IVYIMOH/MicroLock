<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroLock — Save in Sats, Together</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #3DFFD0;
    --mint-dim: #1ABFA0;
    --mint-glow: rgba(61, 255, 208, 0.15);
    --orange: #FF6B1A;
    --orange-dim: #CC5510;
    --orange-glow: rgba(255, 107, 26, 0.2);
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #1A1A1A;
    --border: #242424;
    --text: #F5F5F0;
    --text-muted: #888880;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
 
  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
 
  .logo span { color: var(--mint); }
 
  .nav-right { display: flex; align-items: center; gap: 16px; }
 
sats-ticker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--font-display);
  }
 
  .sats-ticker .dot {
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
 
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--mint-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px var(--mint-glow); }
  }


  .btn-primary {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
 
  .btn-primary:hover {
    background: var(--orange-dim);
    box-shadow: 0 0 24px var(--orange-glow);
    transform: translateY(-1px);
  }
 
  .btn-mint {
    background: transparent;
    color: var(--mint);
    border: 1px solid var(--mint);
    border-radius: 100px;
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .btn-mint:hover {
    background: var(--mint-glow);
  }
 

  /* ── HERO ── */
  .hero {
    padding: 80px 40px 60px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
 
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mint);
    margin-bottom: 20px;
    font-family: var(--font-display);
  }
 
  .hero h1 {
    font-family: var(--font-display);
    font-size: 52px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }
 
  .hero h1 .accent-orange { color: var(--orange); }
  .hero h1 .accent-mint { color: var(--mint); }
 
  .hero-sub {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 36px;
    max-width: 420px;
  }
 
  .hero-ctas { display: flex; gap: 12px; align-items: center; }
 
  .hero-stats {
    display: flex;
    gap: 32px;
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
 
  .hero-stat-val {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
 
  .hero-stat-val.orange { color: var(--orange); }
  .hero-stat-val.mint { color: var(--mint); }
 
  .hero-stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 500;
  }
 

  /* ── VAULT SHOWCASE (hero right) ── */
  .vault-showcase {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
 
  .vault-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
 
  .vault-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(61,255,208,0.04) 100%);
    pointer-events: none;
  }
 
  .vault-card.featured {
    border-color: var(--orange);
    box-shadow: 0 0 32px rgba(255,107,26,0.12);
  }
 
  .vault-card.featured::before {
    background: linear-gradient(135deg, transparent 50%, rgba(255,107,26,0.07) 100%);
  }

  /* ── VAULT RING (signature element) ── */
  .vault-ring {
    position: relative;
    flex-shrink: 0;
  }
 
  .vault-ring svg { transform: rotate(-90deg); }
 
  .vault-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .vault-ring .ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
  .vault-ring .ring-fill.mint { stroke: var(--mint); }
  .vault-ring .ring-fill.orange { stroke: var(--orange); }
 
  .vault-ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
  }
 
  .vault-ring-pct .pct-num { font-size: 15px; }
  .vault-ring-pct .pct-sym { font-size: 9px; color: var(--text-muted); }
 
  .vault-info { flex: 1; min-width: 0; }
  .vault-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
 
  .vault-goal-text {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
 
  .vault-sats {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
 
  .vault-sats .sats-num {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--mint);
  }
 
  .vault-sats .sats-of {
    font-size: 12px;
    color: var(--text-muted);
  }
 
  .vault-members {
    display: flex;
    margin-top: 8px;
    gap: -4px;
  }
 
  .member-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-family: var(--font-display);
    margin-right: -6px;
  }
 
  .vault-badge {
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-display);
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
    align-self: flex-start;
  }
 
  .vault-badge.active { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--orange); }
  .vault-badge.saving { background: var(--mint-glow); color: var(--mint); border: 1px solid var(--mint-dim); }

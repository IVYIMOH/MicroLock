<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroLock — Save in Sats, Together</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #3DFFD0;
    --mint-dim: #1ABFA0;
    --mint-glow: rgba(61, 255, 208, 0.15);
    --orange: #FF6B1A;
    --orange-dim: #CC5510;
    --orange-glow: rgba(255, 107, 26, 0.2);
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #1A1A1A;
    --border: #242424;
    --text: #F5F5F0;
    --text-muted: #888880;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;

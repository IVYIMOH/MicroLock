<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroLock — Save in Sats, Together</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #3DFFD0;
    --mint-dim: #1ABFA0;
    --mint-glow: rgba(61, 255, 208, 0.15);
    --orange: #FF6B1A;
    --orange-dim: #CC5510;
    --orange-glow: rgba(255, 107, 26, 0.2);
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #1A1A1A;
    --border: #242424;
    --text: #F5F5F0;
    --text-muted: #888880;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
 
  .logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
 
  .logo span { color: var(--mint); }
 
  .nav-right { display: flex; align-items: center; gap: 16px; }
 
sats-ticker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--font-display);
  }
 
  .sats-ticker .dot {
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
 
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--mint-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px var(--mint-glow); }
  }


  .btn-primary {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
 
  .btn-primary:hover {
    background: var(--orange-dim);
    box-shadow: 0 0 24px var(--orange-glow);
    transform: translateY(-1px);
  }
 
  .btn-mint {
    background: transparent;
    color: var(--mint);
    border: 1px solid var(--mint);
    border-radius: 100px;
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .btn-mint:hover {
    background: var(--mint-glow);
  }
